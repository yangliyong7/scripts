<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2332" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>词库故事 · 目录</title>
  <link rel="stylesheet" href="assets/css/app.css" />
  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <header class="top">
    <h1>词库故事</h1>
    <span class="muted">每篇 200 词 · 精听精读</span>
  </header>
  <main>
    <section class="card">
      <h2>学习单元</h2>
      <p class="muted">点击单元进入正文。支持手机朗读（浏览器 TTS）、点击高亮词查看释义。</p>
      <ul class="unit-list" id="unitList">
        <li class="status">加载中…</li>
      </ul>
    </section>
    <section class="card">
      <h2>部署说明</h2>
      <p class="muted">将 <code>web/</code> 目录整体上传至任意静态站点（Nginx、OSS、GitHub Pages 等）即可。需通过 HTTPS 或 localhost 访问以获得最佳语音支持。</p>
    </section>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
